<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Renta de Propiedades</title>
    <link rel="stylesheet" href="/Frontend/Css/contact.css">
</head>
<body>
    <header>
        <img src="/Frontend/Images/LogoS.png" alt="Logo de Lokee" class="logo" />
        <h1>LOKEE</h1>
        <p>Tu lugar ideal para vivir o trabajar</p>
    </header>

    <main>
        <section class="contact-section">
            <h2>Contáctenos</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Teléfono:</label>
                    <input type="tel" id="phone" name="phone" placeholder="Teléfono de contacto">
                </div>
                <div class="form-group">
                    <label for="message">Mensaje:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Enviar Mensaje</button>
            </form>
            <p id="response-message"></p>
        </section>
    </main>

    <script src="/Frontend/Js/contact.js"></script>
</body>
</html>
