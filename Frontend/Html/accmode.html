<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokee | Selección de Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/Frontend/Css/accmode.CSS">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <img src="/Frontend/Images/LogoS.png" alt="Lokee Logo" class="logo">
            <div class="profile-icon">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="role-selection">
            <h1 class="welcome-text">¡Bienvenido a Lokee!</h1>
            <p class="role-question">Por favor, selecciona tu perfil:</p>
            
            <div class="cards-container">
                <div class="role-card" id="renterCard">
                    <i class="fas fa-home card-icon"></i>
                    <h2 class="card-title">Inquilino</h2>
                    <p class="card-description">Busco un lugar para vivir</p>
                    <div class="checkmark"><i class="fas fa-check"></i></div>
                </div>

                <div class="role-card" id="landlordCard">
                    <i class="fas fa-key card-icon"></i>
                    <h2 class="card-title">Propietario</h2>
                    <p class="card-description">Ofrezco propiedades en renta</p>
                    <div class="checkmark"><i class="fas fa-check"></i></div>
                </div>
            </div>

            <button class="continue-button disabled" id="continueBtn">
                Continuar <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </main>

    <script src="/Frontend/Js/accmode.JS"></script>
</body>
</html>
